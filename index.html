<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Simple Blog</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: auto;
            padding: 20px;
            background-color: #f5f5f5;
        }

        header {
            text-align: center;
            padding: 20px;
            background: #333;
            color: white;
        }

        article {
            background: white;
            padding: 20px;
            margin-top: 20px;
            border-radius: 8px;
        }

        h2 {
            color: #333;
        }

        .date {
            color: gray;
            font-size: 14px;
        }

        footer {
            text-align: center;
            margin-top: 30px;
            color: gray;
        }
    </style>
</head>
<body>

<header>
    <h1>My Blog</h1>
    <p>Welcome to my personal blog ✨</p>
</header>

<article>
    <h2>My First Post</h2>
    <p class="date">March 19, 2026</p>
    <p>
        This is my first blog post. I'm excited to start writing and sharing my ideas!
    </p>
</article>

<article>
    <h2>Another Post</h2>
    <p class="date">March 18, 2026</p>
    <p>
        This is another example post. You can add as many posts as you want.
    </p>
</article>

<footer>
    <p>© 2026 My Blog</p>
</footer>

</body>
</html>
