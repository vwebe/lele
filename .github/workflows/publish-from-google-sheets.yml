name: Publish from Google Sheets

on:
  workflow_dispatch:
  schedule:
    - cron: "3,13,23,33,43,53 * * * *"

permissions:
  contents: write

concurrency:
  group: publish-from-google-sheets
  cancel-in-progress: false

env:
  TZ: Asia/Jakarta
  GOOGLE_SHEETS_SPREADSHEET_ID: ${{ vars.GOOGLE_SHEETS_SPREADSHEET_ID }}
  GOOGLE_SHEETS_WORKSHEET: ${{ vars.GOOGLE_SHEETS_WORKSHEET }}
  GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
  PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
  LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
  LLM_BASE_URL: ${{ vars.LLM_BASE_URL }}
  LLM_MODEL: ${{ vars.LLM_MODEL }}
  LLM_SITE_URL: ${{ vars.LLM_SITE_URL }}
  LLM_APP_NAME: ${{ vars.LLM_APP_NAME }}

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Debug trigger info
        run: |
          echo "event_name=${{ github.event_name }}"
          echo "ref=${{ github.ref }}"
          echo "workflow=${{ github.workflow }}"
          date

      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install gspread google-auth requests openai
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Ensure script exists
        run: |
          test -f scripts/publish_from_google_sheets.py

      - name: Publish posts from Google Sheets
        run: python scripts/publish_from_google_sheets.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Publish posts from Google Sheets"
            git push
          fi
