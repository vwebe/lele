name: Publish from Google Sheets

on:
  workflow_dispatch:
  schedule:
    - cron: "15 1 * * *"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  TZ: Asia/Phnom_Penh
  GOOGLE_SHEETS_WORKSHEET: ${{ vars.GOOGLE_SHEETS_WORKSHEET || 'Posts' }}

concurrency:
  group: publish-google-sheets
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Publish from Google Sheets
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_SHEETS_SPREADSHEET_ID: ${{ vars.GOOGLE_SHEETS_SPREADSHEET_ID }}
          GOOGLE_SHEETS_WORKSHEET: ${{ env.GOOGLE_SHEETS_WORKSHEET }}
        run: python scripts/publish_from_google_sheets.py

      - name: Commit generated posts
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add _posts
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Publish posts from Google Sheets"
            git push
          fi
