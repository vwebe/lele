---
layout: default
---

<article class="single-post">
  <div class="post-top">
    <div class="post-date">{{ page.date | date: "%B %d, %Y" }}</div>
    <h1>{{ page.title }}</h1>
  </div>

  <div class="post-content">
    {{ content }}
  </div>

  <p class="back-link">
    <a href="{{ '/' | relative_url }}">← Back to home</a>
  </p>
</article>
